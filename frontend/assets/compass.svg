<svg xmlns="http://www.w3.org/2000/svg"
     width="42"
     height="42"
     viewBox="0 0 48 48">

    <!-- Outer Ring -->
    <circle
        cx="24"
        cy="24"
        r="20"
        fill="none"
        stroke="#6C63FF"
        stroke-width="4"/>

    <!-- Cardinal Marks -->
    <line x1="24" y1="2" x2="24" y2="8"
          stroke="#6C63FF"
          stroke-width="4"
          stroke-linecap="round"/>

    <line x1="24" y1="40" x2="24" y2="46"
          stroke="#6C63FF"
          stroke-width="4"
          stroke-linecap="round"/>

    <line x1="2" y1="24" x2="8" y2="24"
          stroke="#6C63FF"
          stroke-width="4"
          stroke-linecap="round"/>

    <line x1="40" y1="24" x2="46" y2="24"
          stroke="#6C63FF"
          stroke-width="4"
          stroke-linecap="round"/>

    <!-- Needle -->
    <polygon
        points="24,9 29,24 24,39 19,24"
        fill="#6C63FF"/>

    <polygon
        points="24,9 24,39 19,24"
        fill="#FFFFFF"/>

    <!-- Center -->
    <circle
        cx="24"
        cy="24"
        r="3.5"
        fill="#6C63FF"/>

    <!-- Small Circle -->
    <circle
        cx="39"
        cy="9"
        r="4"
        fill="none"
        stroke="#6C63FF"
        stroke-width="3"/>

</svg>